<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubbing Complete | AI Studio</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Dubbing Complete!</h1>
            <p>Your video has been successfully processed.</p>
        </header>

        <div class="card">

            <div class="video-wrapper">
                <video controls>
                    <source src="{{ output_video }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Source Language</span>
                    <span class="stat-value">{{ source_lang }}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Target Language</span>
                    <span class="stat-value">{{ target_lang }}</span>
                </div>
            </div>

            <!-- Hidden details for debugging/curiosity without cluttering UI -->
            <details style="margin-bottom: 1.5rem; color: var(--text-secondary); cursor: pointer;">
                <summary>View Debug Timings</summary>
                <div class="stats-grid" style="margin-top: 1rem;">
                    {% for key, val in timings.items() %}
                    <div class="stat-item">
                        <span class="stat-label">{{ key|title }}</span>
                        <span class="stat-value">{{ "%.2f"|format(val) }}s</span>
                    </div>
                    {% endfor %}
                </div>
            </details>

            <a href="{{ output_video }}" download class="btn-primary"
                style="text-align: center; text-decoration: none; display: block; margin-bottom: 1rem;">
                Download Video <i class="fas fa-download" style="margin-left: 8px;"></i>
            </a>

            <a href="/" class="btn-secondary">
                <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Dub Another Video
            </a>

        </div>

    </div>
</body>

</html>
