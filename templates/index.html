<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Dubber | Studio</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Modern Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>AI Studio</h1>
            <p>Transform your videos instantly with AI.</p>
        </header>

        {% if error %}
        <div class="card" style="margin-bottom: 2rem; border-color: #ff3366;">
            <p style="color: #ff3366; text-align: center;"><i class="fas fa-exclamation-circle"></i> {{ error }}</p>
        </div>
        {% endif %}

        <!-- Upload Card -->
        <div id="uploadCard" class="card">
            <form id="uploadForm" action="/process" method="POST" enctype="multipart/form-data"
                onsubmit="this.classList.add('processing-state');">

                <div class="form-group">
                    <label>Source Language</label>
                    <div class="select-wrapper">
                        <select name="source_lang">
                            <option value="multi">Auto Detect (Universal)</option>
                            {% for code, name in languages.items() %}
                            <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Target Language</label>
                    <div class="select-wrapper">
                        <select name="target_lang">
                            <option value="hi" selected>Hindi (India)</option>
                            {% for code, name in languages.items() %}
                            <option value="{{ code }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Upload Media</label>
                    <div class="file-drop-area" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt icon-upload"></i>
                        <span id="fileMsg">Click to upload video</span>
                        <input type="file" name="video_file" id="fileInput" class="file-input" accept="video/*"
                            onchange="document.getElementById('fileMsg').textContent = this.files[0].name">
                    </div>
                </div>

                <div class="form-group">
                    <div
                        style="text-align: center; margin: 1rem 0; color: var(--text-secondary); font-size: 0.8rem; position: relative;">
                        <span style="background: var(--glass-bg); padding: 0 10px;">OR PASTE LINK</span>
                    </div>
                    <div class="url-input-container">
                        <i class="fab fa-youtube url-icon"></i>
                        <input type="url" name="youtube_url" placeholder="https://youtube.com/...">
                    </div>
                </div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Generate Dubbing</span>
                    <i class="fas fa-spinner fa-spin loader"></i>
                </button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.8rem; opacity: 0.6;">
            Powered by Gemini & Advanced TTS Models
        </p>

    </div>
</body>

</html>
